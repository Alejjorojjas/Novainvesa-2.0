# ============================================================
# NOVAINVESA — Spring Boot 3 — application.properties
# Todas las credenciales se leen desde variables de entorno.
# Nunca hardcodear valores sensibles en este archivo.
# ============================================================

# ─────────────────────────────────
# Servidor
# ─────────────────────────────────
spring.application.name=novainvesa-backend
server.port=${PORT:8080}

# ─────────────────────────────────
# Perfil activo
# ─────────────────────────────────
spring.profiles.active=${SPRING_PROFILES_ACTIVE:development}

# ─────────────────────────────────
# Base de datos — MySQL (Hostinger)
# ─────────────────────────────────
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:novainvesa_db}?useSSL=true&requireSSL=false&serverTimezone=America/Bogota&characterEncoding=UTF-8&useUnicode=true&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool de conexiones (HikariCP)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ─────────────────────────────────
# JPA / Hibernate
# ─────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=America/Bogota
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# ─────────────────────────────────
# JWT — Autenticación
# ─────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.admin-secret=${JWT_ADMIN_SECRET}
# Expiración en ms: 604800000 = 7 días (usuarios), 86400000 = 24h (admin)
jwt.expiration=${JWT_EXPIRATION:604800000}
jwt.admin-expiration=${JWT_ADMIN_EXPIRATION:86400000}

# ─────────────────────────────────
# CORS — Frontend URL permitida
# ─────────────────────────────────
app.cors.allowed-origin=${FRONTEND_URL:http://localhost:3000}

# ─────────────────────────────────
# Email SMTP (Hostinger)
# ─────────────────────────────────
spring.mail.host=${SMTP_HOST:smtp.hostinger.com}
spring.mail.port=${SMTP_PORT:465}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=${SMTP_HOST:smtp.hostinger.com}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ─────────────────────────────────
# Pagos
# ─────────────────────────────────
app.wompi.public-key=${WOMPI_PUBLIC_KEY:}
app.wompi.private-key=${WOMPI_PRIVATE_KEY:}
app.wompi.events-secret=${WOMPI_EVENTS_SECRET:}

app.mercadopago.access-token=${MP_ACCESS_TOKEN:}
app.mercadopago.webhook-secret=${MP_WEBHOOK_SECRET:}

# ─────────────────────────────────
# Dropi
# ─────────────────────────────────
app.dropi.email=${DROPI_EMAIL:}
app.dropi.password=${DROPI_PASSWORD:}
app.dropi.api-url=https://api.dropi.co/api/v1

# ─────────────────────────────────
# N8n — Automatización
# ─────────────────────────────────
app.n8n.webhook-url=${N8N_WEBHOOK_URL:}
app.n8n.secret=${N8N_SECRET:}

# ─────────────────────────────────
# Meta — Conversions API
# ─────────────────────────────────
app.meta.pixel-id=${META_PIXEL_ID:}
app.meta.capi-token=${META_CAPI_TOKEN:}

# ─────────────────────────────────
# WhatsApp — Chatea Pro
# ─────────────────────────────────
app.chateapro.api-key=${CHATEAPRO_API_KEY:}
app.chateapro.api-url=${CHATEAPRO_API_URL:https://api.chateapro.co}

# ─────────────────────────────────
# Frontend URL (para links en emails)
# ─────────────────────────────────
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

# ─────────────────────────────────
# Spring Actuator — DESHABILITADO en producción
# Solo /health queda expuesto para que Render pueda hacer health checks
# ─────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoints.enabled-by-default=false
management.endpoint.health.enabled=true

# ─────────────────────────────────
# Spring MVC — deshabilitar suffix pattern matching
# Evita conflicto con mvcHandlerMappingIntrospector en Spring Security
# ─────────────────────────────────
spring.mvc.pathmatch.use-suffix-pattern=false
spring.mvc.pathmatch.use-registered-suffix-pattern=false
spring.main.allow-bean-definition-overriding=true

# ─────────────────────────────────
# Logging
# ─────────────────────────────────
logging.level.root=WARN
logging.level.com.novainvesa=INFO
logging.level.org.springframework.security=WARN
# Nunca loggear a nivel DEBUG en producción — puede exponer datos sensibles
