name: Deploy Backend — Render

on:
  push:
    branches: [main]
    paths:
      - 'Backend/**'
      - '.github/workflows/deploy-backend.yml'

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build JAR & Deploy a Render
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build con Maven (sin tests)
        working-directory: Backend
        run: ./mvnw clean package -DskipTests -q

      - name: Verificar JAR generado
        working-directory: Backend
        run: |
          JAR=$(ls target/*.jar | grep -v original | head -1)
          echo "JAR: $JAR"
          ls -lh "$JAR"

      - name: Trigger redeploy en Render
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json" \
            --fail-with-body
          echo "Deploy a Render disparado correctamente"
